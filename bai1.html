<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        
        body {
            font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
            background-color: #ffe4e1; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        
        form {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        fieldset {
            border: none; 
            padding: 0;
            margin: 0;
        }

        
        .form-group-title {
            font-weight: 600;
            color: #333333;
            margin-top: 15px;
            margin-bottom: 8px;
            display: block;
        }

        
        input[type="text"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; 
            font-family: inherit;
            font-size: 14px;
        }

       
        .row-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            color: #444;
            font-size: 15px;
        }

        .row-option input {
            margin: 0;
            cursor: pointer;
        }

        input[type="button"], 
        input[type="submit"] {
            width: 100%;
            background-color: #ff69b4; 
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        input[type="button"]:hover,
        input[type="submit"]:hover {
            background-color: #ff1493;
        }

        .car-select {
            margin-top: -5px;
        }
    </style>
</head>

<body>
    <form action="" method="get">
        <fieldset>
            <!-- Nhóm Đăng Nhập -->
            <label for="username" class="form-group-title">Tên đăng nhập:</label>
            <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập...">

            <label for="password" class="form-group-title">Mật khẩu:</label>
            <input type="password" id="password" name="password" placeholder="Nhập mật khẩu...">

            <input type="button" value="Đăng nhập" />

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <!-- Nhóm Giới Tính -->
            <span class="form-group-title">Giới tính:</span>
            <label class="row-option">
                <input type="radio" id="nam" name="gioitinh" value="nam" checked> Nam
            </label>
            <label class="row-option">
                <input type="radio" id="nu" name="gioitinh" value="nu"> Nữ
            </label>
            <label class="row-option">
                <input type="radio" id="khac" name="gioitinh" value="khac"> Khác
            </label>

            <!-- Nhóm Sở Thích -->
            <span class="form-group-title">Sở thích:</span>
            <label class="row-option">
                <input type="checkbox" id="bongchuyen" name="sothich" value="bongchuyen"> Bóng chuyền
            </label>
            <label class="row-option">
                <input type="checkbox" id="caulong" name="sothich" value="caulong"> Cầu lông
            </label>
            <label class="row-option">
                <input type="checkbox" id="bongda" name="sothich" value="bongda"> Bóng đá
            </label>

            <!-- Nhóm Thông Tin Thêm -->
            <label for="quequan" class="form-group-title">Quê quán:</label>
            <select name="quequan" id="quequan">
                <option value="Hanoi">Hà Nội</option>
                <option value="ThanhHoa">Thanh Hóa</option>
                <option value="HaiPhong">Hải Phòng</option>
                <option value="NamDinh">Nam Định</option>
            </select>

            <label for="xe" class="form-group-title">Hãng xe yêu thích:</label>
            <select name="xe" id="xe" class="car-select">
                <optgroup label="Japan">
                    <option value="honda">Honda</option>
                    <option value="toyota">Toyota</option>
                </optgroup>
                <optgroup label="Germany">
                    <option value="audi">Audi</option>  
                    <option value="mercedes">Mercedes</option>
                </optgroup>
            </select>

            <label for="noidung" class="form-group-title">Nội dung:</label>
            <textarea id="noidung" name="noidung" rows="5" placeholder="Nhập nội dung ở đây..."></textarea>

            <!-- Nút Gửi dữ liệu -->
            <input type="submit" value="Gửi thông tin" />
        </fieldset>
    </form>
</body>
</html>
